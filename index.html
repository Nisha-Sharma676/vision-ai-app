<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azure AI Vision App</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  text-align: center;
  padding: 30px;
}

.container {
  width: 60%;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input {
  width: 80%;
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px 20px;
  background: #0078D4;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

pre {
  text-align: left;
  background: #eee;
  padding: 15px;
  margin-top: 20px;
  overflow: auto;
  max-height: 400px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 Azure AI Vision App</h1>

<input type="text" id="imgUrl" placeholder="Enter Image URL">

<br>

<input type="file" id="imgFile" accept="image/*">

<br>

<button onclick="analyze()">Analyze Image</button>

<pre id="output">Result will appear here...</pre>

</div>

<script>
async function analyze() {
  const url = document.getElementById("imgUrl").value;
  const file = document.getElementById("imgFile").files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = async function () {
      sendData({ image_base64: reader.result });
    };

    reader.readAsDataURL(file);
  }
  else if (url) {
    sendData({ url: url });
  }
  else {
    alert("Please enter URL or upload image");
  }
}

async function sendData(body) {
  const res = await fetch("/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  const data = await res.json();
  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
