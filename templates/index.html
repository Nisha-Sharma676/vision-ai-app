<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Azure AI Vision App</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding:30px;
}

.container{
width:60%;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

input{
width:80%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#0078D4;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

pre{
text-align:left;
background:#eee;
padding:15px;
margin-top:20px;
overflow:auto;
max-height:400px;
}
</style>

</head>

<body>

<div class="container">

<h1>🧠 Azure AI Vision App</h1>

<input type="text" id="imgUrl" placeholder="Enter Image URL">

<br>

<input type="file" id="imgFile" accept="image/*">

<br>

<button onclick="analyze()">Analyze Image</button>

<pre id="output">Result will appear here...</pre>

</div>

<script>

async function analyze(){

const url=document.getElementById("imgUrl").value;
const file=document.getElementById("imgFile").files[0];

let response;

if(file){

const formData=new FormData();
formData.append("image",file);

response=await fetch("/analyze-file",{
method:"POST",
body:formData
});

}
else if(url){

response=await fetch("/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:url})
});

}
else{

alert("Please upload image or enter URL");
return;

}

const data=await response.json();

document.getElementById("output").textContent=
JSON.stringify(data,null,2);

}

</script>

</body>
</html>
